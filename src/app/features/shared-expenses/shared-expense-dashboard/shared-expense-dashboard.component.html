<app-loading [isLoading]="isLoading"></app-loading>

<div class="container mt-4" *ngIf="!isLoading">
    <h1 class="mt-3">Gastos Compartidos</h1>

    <!-- Total widget -->
    <div class="card bg-light mb-4">
        <div class="card-body d-flex justify-content-between align-items-center">
            <span class="fw-bold fs-5">Total pendiente</span>
            <span class="fs-4 fw-bold" [ngClass]="totalPending > 0 ? 'text-warning' : 'text-success'">
                {{ totalPending | currencyFiatFormat }}
            </span>
        </div>
    </div>

    <!-- Filtros -->
    <div class="btn-group mb-3" role="group">
        <button type="button" class="btn"
            [ngClass]="filterStatus === 'pending' ? 'btn-primary' : 'btn-outline-primary'"
            (click)="filterStatus = 'pending'">Con deuda</button>
        <button type="button" class="btn"
            [ngClass]="filterStatus === 'all' ? 'btn-primary' : 'btn-outline-primary'"
            (click)="filterStatus = 'all'">Todos</button>
        <button type="button" class="btn"
            [ngClass]="filterStatus === 'paid' ? 'btn-primary' : 'btn-outline-primary'"
            (click)="filterStatus = 'paid'">Saldados</button>
    </div>

    <ng-container *ngIf="filtered.length > 0; else empty">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Persona</th>
                    <th class="text-end">Monto pendiente</th>
                    <th class="text-center">Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of filtered">
                    <td>{{ item.personName }}</td>
                    <td class="text-end">{{ item.totalPending | currencyFiatFormat }}</td>
                    <td class="text-center">
                        <span *ngIf="item.totalPending > 0" class="badge bg-warning text-dark">Pendiente</span>
                        <span *ngIf="item.totalPending === 0" class="badge bg-success">Saldado</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </ng-container>

    <ng-template #empty>
        <div class="alert alert-info mt-3" role="alert">
            No hay personas en este estado.
        </div>
    </ng-template>
</div>
