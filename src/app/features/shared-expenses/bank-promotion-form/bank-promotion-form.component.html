<div class="bank-promotion-form">
  <div class="row mb-2">
    <div class="col-md-6">
      <label class="form-label">Monto devuelto por el banco</label>
      <div class="input-group input-group-sm">
        <span class="input-group-text">$</span>
        <input type="number" class="form-control" name="bankPromotionAmount"
               [(ngModel)]="amount" (ngModelChange)="onChange()"
               min="0.01" step="0.01">
      </div>
    </div>
    <div class="col-md-6">
      <label class="form-label">Fecha de acreditación</label>
      <input type="date" class="form-control form-control-sm" name="bankPromotionDate"
             [(ngModel)]="date" (ngModelChange)="onChange()">
    </div>
  </div>
  <div class="row mb-2">
    <div class="col-md-6">
      <label class="form-label">Cuenta donde se acreditó</label>
      <select class="form-select form-select-sm" name="bankPromotionAccount"
              [(ngModel)]="accountId" (ngModelChange)="onChange()">
        <option value="" disabled selected>Seleccione</option>
        <option *ngFor="let a of accounts" [value]="a.id">{{ a.name }}</option>
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Categoría</label>
      <select class="form-select form-select-sm" name="bankPromotionClass"
              [(ngModel)]="transactionClassId" (ngModelChange)="onChange()">
        <option value="" disabled selected>Seleccione</option>
        <option *ngFor="let c of incomeClasses" [value]="c.id">{{ c.description }}</option>
      </select>
    </div>
  </div>
  <small class="text-muted">
    El banco acreditó este monto al momento de la compra; se descontará de las próximas cuotas hasta agotarse.
  </small>

  <div class="mt-3 mb-0">
    <label class="form-label">Notas (opcional)</label>
    <textarea class="form-control form-control-sm" name="bankPromotionNotes"
              [(ngModel)]="notes" rows="2" (ngModelChange)="onChange()"></textarea>
  </div>
</div>
