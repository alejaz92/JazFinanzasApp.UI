<app-loading [isLoading]="isLoading"></app-loading>

<div class="container mt-4" *ngIf="!isLoading">
    <div class="d-flex align-items-center gap-2 mb-3">
        <h1 class="mb-0">Clases de Movimiento</h1>
        <a class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center"
           [routerLink]="['/management/transactionClass/add']"
           title="Crear Clase de Movimiento"
           style="width: 44px; height: 44px; font-size: 1.2rem;">
            <i class="bi-plus-lg text-white"></i>
        </a>
    </div>

    <div class="row">
        <div class="col-md-6" *ngIf="incomeClasses !== null && incomeClasses.length > 0">
            <h3>Ingresos</h3>
            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>Descripcion</th>
                            <th class="text-nowrap" style="width: 110px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let transactionClass of incomeClasses">
                            <td class="align-middle">{{transactionClass.description}}</td>
                            <td class="align-middle">
                                <ng-container *ngIf="canEditOrDelete(transactionClass)">
                                    <div class="d-flex justify-content-center gap-2">
                                        <a title="Editar" class="btn-icon bg-primary" [routerLink]="['/management/transactionClass',transactionClass.id]">
                                            <i class="bi-pencil-square"></i>
                                        </a>
                                        <button title="Eliminar" class="btn-icon bg-danger" (click)="onDelete(transactionClass.id)">
                                            <i class="bi-trash"></i>
                                        </button>
                                    </div>
                                </ng-container>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-md-6" *ngIf="expenseClasses !== null && expenseClasses.length > 0">
            <h3>Egresos</h3>
            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>Descripcion</th>
                            <th class="text-nowrap" style="width: 110px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let transactionClass of expenseClasses">
                            <td class="align-middle">{{transactionClass.description}}</td>
                            <td class="align-middle">
                                <ng-container *ngIf="canEditOrDelete(transactionClass)">
                                    <div class="d-flex justify-content-center gap-2">
                                        <a title="Editar" class="btn-icon bg-primary" [routerLink]="['/management/transactionClass',transactionClass.id]">
                                            <i class="bi-pencil-square"></i>
                                        </a>
                                        <button title="Eliminar" class="btn-icon bg-danger" (click)="onDelete(transactionClass.id)">
                                            <i class="bi-trash"></i>
                                        </button>
                                    </div>
                                </ng-container>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<app-confirm-modal #deleteModal
    title="Eliminar Clase de Movimiento"
    message="¿Está seguro de eliminar esta clase de movimiento?"
    confirmLabel="Eliminar"
    (confirmed)="onDeleteConfirmed()">
</app-confirm-modal>
