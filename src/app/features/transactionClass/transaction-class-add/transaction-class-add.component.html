
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
        <h1 class="mb-0">Crear Clase de Movimiento</h1>
        <app-back-button [defaultUrl]="['/management/transactionClass']"></app-back-button>
    </div>
    <form #form="ngForm" (ngSubmit)="onFormSubmit()">
        <div class="mt-2">
            <div class="mt-3">
                <label for="transactionClassDescription" class="form-label">Descripción</label>
                <input type="text"
                    class="form-control"
                    id="transactionClassDescription"
                    name="transactionClassDescription"
                    [(ngModel)]="model.description">
            </div>
        </div>
        <!-- select between ingreso o egreso (value I o E) para el campo incExp-->
        <div class="mt-3">
            <label for="transactionClassIncExp" class="form-label">Tipo</label>
            <select
                class="form-select"
                id="transactionClassIncExp"
                name="transactionClassIncExp"
                [(ngModel)]="model.incExp">
                <option value="I">Ingreso</option>
                <option value="E">Egreso</option>
            </select>
        </div>

        <div class="text-end mt-3">
            <button type="submit" class="btn btn-primary m-1">Insertar</button>
        </div>
    </form>
</div>
