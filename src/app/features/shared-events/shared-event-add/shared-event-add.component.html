<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
        <h1 class="mb-0">Nuevo evento compartido</h1>
        <app-back-button [defaultUrl]="['/shared-events']"></app-back-button>
    </div>
    <form #form="ngForm" (ngSubmit)="onFormSubmit()">
        <div class="mt-3">
            <label for="eventName" class="form-label">Nombre <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="eventName" name="eventName"
                [(ngModel)]="name" required placeholder="Ej: Asado sábado 25/5">
        </div>
        <div class="mt-3">
            <label for="eventNotes" class="form-label">Notas (opcional)</label>
            <textarea class="form-control" id="eventNotes" name="eventNotes"
                [(ngModel)]="notes" rows="2"></textarea>
        </div>
        <div class="mt-3">
            <label class="form-label">Participantes</label>
            <div *ngIf="people.length === 0" class="text-muted">
                No hay personas registradas. <a routerLink="/management/people">Agregar personas</a>
            </div>
            <div class="row" *ngIf="people.length > 0">
                <div class="col-md-4 col-sm-6" *ngFor="let person of people">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" [id]="'person_' + person.id"
                            [checked]="isSelected(person.id)" (change)="togglePerson(person.id)">
                        <label class="form-check-label" [for]="'person_' + person.id">
                            {{ person.alias || person.name }}
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <div class="text-end mt-4">
            <button type="submit" class="btn btn-primary" [disabled]="!form.valid">Guardar</button>
        </div>
    </form>
</div>
