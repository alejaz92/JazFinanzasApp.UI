<app-loading [isLoading]="isLoading"></app-loading>
<div class="container mt-5" *ngIf="!isLoading">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="text-center mb-4">
                <img src="assets/images/logo.ico" alt="JazFinanzas" width="72" height="72">
            </div>
            <h1 class="mb-4">Iniciar Sesión</h1>
            <form (submit)="login()">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" class="form-control" id="username" name="username"
                    [(ngModel)]="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="password"
                    [(ngModel)]="password" required>
                </div>
                <div class="mb-3">
                    <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                </div>
            </form>

            <a routerLink="/register" class="btn btn-outline-secondary w-100 mb-3">Registrarse</a>

            <div class="text-center text-muted small"
                 data-bs-toggle="tooltip" data-bs-placement="top"
                 title="Comuníquese con el administrador del sistema"
                 style="cursor: pointer;">
                <i class="bi bi-info-circle me-1"></i>¿Olvidó su usuario y/o contraseña?
            </div>
        </div>
    </div>
</div>
