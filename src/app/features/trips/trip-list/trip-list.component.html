<app-loading [isLoading]="isLoading"></app-loading>

<div class="container mt-4" *ngIf="!isLoading">
    <div class="d-flex align-items-center gap-2 mb-3">
        <h1 class="mb-0">Viajes</h1>
        <a class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center"
           [routerLink]="['/management/trips/add']"
           title="Agregar Viaje"
           style="width: 44px; height: 44px; font-size: 1.2rem;">
            <i class="bi-plus-lg text-white"></i>
        </a>
        <div class="ms-auto">
            <input type="text" class="form-control" placeholder="Buscar viaje..."
                   [(ngModel)]="searchTerm" style="max-width: 250px;">
        </div>
    </div>

    <ng-container *ngIf="filteredTrips && filteredTrips.length > 0; else empty">
        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Inicio</th>
                        <th>Fin</th>
                        <th>Estado</th>
                        <th class="text-nowrap" style="width: 150px;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let trip of filteredTrips">
                        <td>{{ trip.name }}</td>
                        <td>{{ typeLabel(trip.type) }}</td>
                        <td>{{ trip.startDate | date:'dd/MM/yyyy' }}</td>
                        <td>{{ trip.endDate | date:'dd/MM/yyyy' }}</td>
                        <td>
                            <span class="badge" [ngClass]="statusBadgeClass(trip.status)">{{ statusLabel(trip.status) }}</span>
                        </td>
                        <td>
                            <!-- Acciones para pantallas grandes -->
                            <div class="d-none d-md-flex justify-content-center gap-2">
                                <a title="Ver detalle" class="btn-icon bg-secondary" [routerLink]="['/management/trips', trip.id, 'detail']">
                                    <i class="bi-eye"></i>
                                </a>
                                <a title="Editar" class="btn-icon bg-primary" [routerLink]="['/management/trips', trip.id]">
                                    <i class="bi-pencil-square"></i>
                                </a>
                                <button title="Eliminar" class="btn-icon bg-danger" (click)="onDelete(trip.id)">
                                    <i class="bi-trash"></i>
                                </button>
                            </div>
                            <!-- Dropdown para pantallas chicas -->
                            <div class="d-md-none d-flex justify-content-center align-items-center">
                                <div class="dropdown">
                                    <button
                                        class="btn btn-light border rounded-circle d-flex align-items-center justify-content-center"
                                        type="button"
                                        data-bs-toggle="dropdown"
                                        aria-expanded="false"
                                        title="Acciones"
                                        style="width: 40px; height: 40px;">
                                        <i class="bi-list fs-5"></i>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <a class="dropdown-item" [routerLink]="['/management/trips', trip.id, 'detail']">
                                                <i class="bi-eye me-2"></i>Ver detalle
                                            </a>
                                        </li>
                                        <li>
                                            <a class="dropdown-item" [routerLink]="['/management/trips', trip.id]">
                                                <i class="bi-pencil-square me-2"></i>Editar
                                            </a>
                                        </li>
                                        <li>
                                            <button class="dropdown-item text-danger" (click)="onDelete(trip.id)">
                                                <i class="bi-trash me-2"></i>Eliminar
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </ng-container>

    <ng-template #empty>
        <div class="text-center py-5 text-muted">
            <i class="bi bi-inbox fs-1 d-block mb-3"></i>
            <p class="mb-0">No hay viajes registrados.</p>
        </div>
    </ng-template>
</div>

<app-confirm-modal #deleteModal
    title="Eliminar Viaje"
    message="¿Estás seguro de eliminar este viaje? Los movimientos asociados quedarán desasociados, no se eliminarán."
    confirmLabel="Eliminar"
    (confirmed)="onDeleteConfirmed()">
</app-confirm-modal>
