<app-loading [isLoading]="isLoading"></app-loading>


<div class="container mt-4" *ngIf="!isLoading">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mt-3 mb-3">
        <div class="d-flex align-items-center flex-grow-1 gap-2">
            <h1 class="mb-0">Cuentas</h1>
            <a class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center"
               [routerLink]="['/management/account/add']"
               title="Crear Cuenta"
               style="width: 44px; height: 44px; font-size: 1.2rem;">
                <i class="bi-plus-lg text-white"></i>
            </a>
        </div>

        <div class="flex-grow-1 flex-md-grow-0">
            <input type="text"
                   [(ngModel)]="searchTerm"
                   class="form-control"
                   placeholder="Buscar cuenta..."
                   style="max-width: 250px;">
        </div>
    </div>

    <ng-container *ngIf="accounts">
        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th class="text-nowrap" style="width: 150px;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let account of filteredAccounts">
                        <td class="align-middle">{{ account.name }}</td>
                        <td class="align-middle">
                            <!-- Acciones para pantallas grandes -->
                            <div class="d-none d-md-flex gap-2">
                                <a title="Editar" class="btn-icon bg-primary" [routerLink]="['/management/account',account.id]">
                                    <i class="bi-pencil-square"></i>
                                </a>
                                <a title="Asignar Tipo de Activo" class="btn-icon bg-success" [routerLink]="['/management/account/asset-type',account.id]">
                                    <i class="bi-card-checklist"></i>
                                </a>
                                <button title="Eliminar" class="btn-icon bg-danger" (click)="onDelete(account.id)">
                                    <i class="bi-trash"></i>
                                </button>
                            </div>
                            <!-- Dropdown para pantallas chicas -->
                            <div class="d-md-none d-flex justify-content-center align-items-center">
                                <div class="dropdown">
                                    <button
                                        class="btn btn-light border rounded-circle d-flex align-items-center justify-content-center"
                                        type="button"
                                        data-bs-toggle="dropdown"
                                        aria-expanded="false"
                                        title="Acciones"
                                        style="width: 40px; height: 40px;">
                                        <i class="bi-list fs-5"></i>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <a class="dropdown-item" [routerLink]="['/management/account',account.id]">
                                                <i class="bi-pencil-square me-2"></i>Editar
                                            </a>
                                        </li>
                                        <li>
                                            <a class="dropdown-item" [routerLink]="['/management/account/asset-type',account.id]">
                                                <i class="bi-card-checklist me-2"></i>Asignar Tipo de Activo
                                            </a>
                                        </li>
                                        <li>
                                            <button class="dropdown-item text-danger" (click)="onDelete(account.id)">
                                                <i class="bi-trash me-2"></i>Eliminar
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </ng-container>
</div>

<app-confirm-modal #deleteModal
    title="Eliminar Cuenta"
    message="¿Está seguro de eliminar esta cuenta?"
    confirmLabel="Eliminar"
    (confirmed)="onDeleteConfirmed()">
</app-confirm-modal>
