<div class="container">
    <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
        <h1 class="mb-0">Crear Cuenta</h1>
        <app-back-button [defaultUrl]="['/management/account']"></app-back-button>
    </div>
    <form #form="ngForm" (ngSubmit)="onFormSubmit()">
        <div class="mt-2">
            <div class="mt-3">
                <label for="accountName" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="accountName" name="accountName"
                [(ngModel)]="model.name">
            </div>
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary m-1">Insertar</button>
        </div>
    </form>
</div>
