<app-loading [isLoading]="isLoading"></app-loading>

<div class="container mt-4" *ngIf="!isLoading">
    <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
        <h1 class="mb-0">Gestion de tipos de Activo</h1>
        <app-back-button [defaultUrl]="['/management/account']"></app-back-button>
    </div>
    <h3 class="mt-3">Cuenta: <strong>{{ accountName }}</strong></h3>

    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>Tipo de Activo</th>
                    <th>Seleccionar</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let assetType of assetTypes">
                    <td class="align-middle">{{ assetType.name }}</td>
                    <td class="p-0 align-middle" [ngClass]="assetType.isSelected ? 'bg-success' : 'bg-secondary'">
                        <div class="d-flex justify-content-between align-items-center px-3 fw-semibold text-white"
                             style="width: 100%; height: 100%; min-height: 100%; padding-top: 0.75rem; padding-bottom: 0.75rem;">
                            <span>{{ assetType.isSelected ? 'Seleccionado' : 'No seleccionado' }}</span>
                            <i class="bi fs-5"
                               role="button"
                               [ngClass]="assetType.isSelected ? 'bi-toggle-on' : 'bi-toggle-off'"
                               (click)="assetType.isSelected = !assetType.isSelected"
                               [title]="assetType.isSelected ? 'Quitar' : 'Seleccionar'">
                            </i>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="text-end mt-3">
        <button class="btn btn-primary m-1" (click)="updateAssetTypes()">Guardar</button>
    </div>
</div>
