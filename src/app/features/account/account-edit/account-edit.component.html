<app-loading [isLoading]="isLoading"></app-loading>
<div class="container mt-4" *ngIf="!isLoading">
    <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
        <h1 class="mb-0">Editar Cuenta</h1>
        <app-back-button [defaultUrl]="['/management/account']"></app-back-button>
    </div>
    <ng-container *ngIf="account;else notFound">

        <form #form="ngForm" (ngSubmit)="onFormSubmit()">
            <div class="mt-2">
                <div class="mt-3">
                    <label class="form-label" for="accountName">Nombre</label>
                    <input type="text" class="form-control" id="accountName" [(ngModel)]="account.name"
                    name="accountName">
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary m-1">Guardar</button>
                </div>
            </div>
        </form>
    </ng-container>

    <ng-template #notFound>
        <div class="alert alert-warning" role="alert">
            La cuenta no ha sido encontrada.
          </div>
    </ng-template>
</div>
