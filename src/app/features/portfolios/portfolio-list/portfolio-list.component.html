<app-loading [isLoading]="isLoading"></app-loading>

<div class="container mt-4" *ngIf="!isLoading">
    <div class="d-flex align-items-center gap-2 mb-3">
        <h1 class="mb-0">Carteras</h1>
        <a class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center"
           [routerLink]="['/management/portfolio/add']"
           title="Crear Cartera"
           style="width: 44px; height: 44px; font-size: 1.2rem;">
            <i class="bi-plus-lg text-white"></i>
        </a>
    </div>

    <ng-container *ngIf="portfolios">
        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th class="text-end">Valor actual ({{ mainReference?.symbol }})</th>
                        <th class="text-nowrap" style="width: 110px;">Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let portfolio of portfolios">
                        <td class="align-middle">{{ portfolio.portfolioName }}</td>
                        <td class="align-middle text-end">{{ portfolio.actualValue | currencyFiatFormat }}</td>
                        <td class="align-middle">
                            <!-- Acciones para pantallas grandes -->
                            <div class="d-none d-md-flex justify-content-center gap-2">
                                <a title="Editar" class="btn-icon bg-primary" [routerLink]="['/management/portfolio', portfolio.portfolioId]">
                                    <i class="bi-pencil-square"></i>
                                </a>
                                <button title="Eliminar" class="btn-icon bg-danger" (click)="onDelete(portfolio.portfolioId)" *ngIf="!portfolio.isDefault && portfolio.actualValue === 0">
                                    <i class="bi-trash"></i>
                                </button>
                            </div>
                            <!-- Dropdown para pantallas chicas -->
                            <div class="d-md-none d-flex justify-content-center align-items-center">
                                <div class="dropdown">
                                    <button
                                        class="btn btn-light border rounded-circle d-flex align-items-center justify-content-center"
                                        type="button"
                                        data-bs-toggle="dropdown"
                                        aria-expanded="false"
                                        title="Acciones"
                                        style="width: 40px; height: 40px;">
                                        <i class="bi-list fs-5"></i>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <a class="dropdown-item" [routerLink]="['/management/portfolio', portfolio.portfolioId]">
                                                <i class="bi-pencil-square me-2"></i>Editar
                                            </a>
                                        </li>
                                        <li *ngIf="!portfolio.isDefault && portfolio.actualValue === 0">
                                            <button class="dropdown-item text-danger" (click)="onDelete(portfolio.portfolioId)">
                                                <i class="bi-trash me-2"></i>Eliminar
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </ng-container>

</div>

<app-confirm-modal #deleteModal
    title="Eliminar Cartera"
    message="¿Está seguro de eliminar esta cartera?"
    confirmLabel="Eliminar"
    (confirmed)="onDeleteConfirmed()">
</app-confirm-modal>
