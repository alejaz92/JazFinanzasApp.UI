<app-loading [isLoading]="isLoading"></app-loading>

<div class="container mt-4" *ngIf="!isLoading">
    <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
        <h1 class="mb-0">Editar Persona</h1>
        <app-back-button [defaultUrl]="['/management/people']"></app-back-button>
    </div>
    <ng-container *ngIf="person; else notFound">
        <form #form="ngForm" (ngSubmit)="onFormSubmit()">
            <div class="mt-3">
                <label class="form-label" for="personName">Nombre <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="personName" name="personName"
                    [(ngModel)]="person.name" required>
            </div>
            <div class="mt-3">
                <label class="form-label" for="personAlias">Alias (opcional)</label>
                <input type="text" class="form-control" id="personAlias" name="personAlias"
                    [(ngModel)]="person.alias">
            </div>
            <div class="text-end mt-4">
                <button type="submit" class="btn btn-primary" [disabled]="!form.valid">Guardar</button>
            </div>
        </form>
    </ng-container>

    <ng-template #notFound>
        <div class="alert alert-warning" role="alert">
            La persona no ha sido encontrada.
        </div>
    </ng-template>
</div>
