<div #modalRef class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">{{ title }}</h5>
        <button type="button" class="btn-close btn-close-white" (click)="onCancel()"></button>
      </div>
      <div class="modal-body">
        <p class="mb-0">{{ message }}</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" (click)="onCancel()">{{ cancelLabel }}</button>
        <button type="button" class="btn btn-primary" (click)="onConfirm()">
          <i class="bi bi-check-lg me-1"></i>{{ confirmLabel }}
        </button>
      </div>
    </div>
  </div>
</div>
